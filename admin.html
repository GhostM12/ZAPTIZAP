<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nevasca Açaí | Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>PAINEL <span>ADMIN</span></h1></header>

<div class="admin-box">
    <h3>🚀 Promoção do Dia (Destaque)</h3>
    <div class="form-group">
        <input type="text" id="promoNome" placeholder="Nome da Promoção">
        <input type="text" id="promoPreco" placeholder="Preço (ex: 19.90)">
        <input type="text" id="promoImg" placeholder="URL da Imagem da Promoção">
        <button class="btn-save" id="btnSalvarPromo">ATUALIZAR DESTAQUE</button>
    </div>

    <h3 style="margin-top: 40px;">➕ Adicionar Novo Produto</h3>
    <div class="form-group">
        <input type="text" id="n" placeholder="Nome do Produto">
        <input type="text" id="p" placeholder="Preço">
        <input type="number" id="q" placeholder="Estoque">
        <input type="text" id="i" placeholder="URL da Imagem">
        <button class="btn-save" id="btnSalvar" style="background: #25d366; color: white;">SALVAR PRODUTO</button>
    </div>

    <h3 style="margin-top: 40px;">📋 Produtos Cadastrados</h3>
    <div id="listaAdmin"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDdgT50VAOkLWpDrbBJm_dLdfsehkSJBE", projectId: "zaptishopwhats" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "produtos");
    
    // Atualizar Promoção
    document.getElementById('btnSalvarPromo').onclick = async () => {
        await setDoc(doc(db, "config", "promocao_dia"), { 
            nome: document.getElementById('promoNome').value, 
            preco: document.getElementById('promoPreco').value, 
            img: document.getElementById('promoImg').value 
        });
        alert("Promoção atualizada!");
    };

    // Salvar Produto
    document.getElementById('btnSalvar').onclick = async () => {
        await addDoc(colRef, { 
            nome: document.getElementById('n').value,
            preco: document.getElementById('p').value,
            estoque: parseInt(document.getElementById('q').value) || 0,
            img: document.getElementById('i').value 
        });
        alert("Produto adicionado!");
    };

    // Função Excluir
    window.apagar = async (id) => {
        if(confirm("Tem certeza que deseja excluir este produto?")) {
            await deleteDoc(doc(db, "produtos", id));
        }
    };

    // Listar Produtos com Botão Excluir
    onSnapshot(colRef, (snap) => {
        const lista = document.getElementById('listaAdmin');
        lista.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            lista.innerHTML += `
                <div style="background: #1a0026; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #4b0082;">
                    <span>${p.nome} - R$ ${p.preco}</span>
                    <button onclick="apagar('${d.id}')" style="background: #ff4d4d; border: none; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer;">Excluir</button>
                </div>`;
        });
    });
</script>
</body>
</html>
