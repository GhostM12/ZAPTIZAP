<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nevasca Açaí</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Nevasca<span> Açaí</span></h1></header>

<div id="promoBarra" onclick="window.open(linkWhatsAppPromo, '_blank')">
    <img id="promoFoto" src="">
    <div>🔥 DESTAQUE: <span id="promoTexto"></span> - R$ <span id="promoValor"></span></div>
</div>

<div class="search-wrapper">
    <div class="search-box"><input type="text" id="campoBusca" placeholder="🔍 Buscar sabor..." onkeyup="filtrar()"></div>
</div>

<main class="container" id="vitrine"></main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDdgT50VAOkLWpDrbBJm_dLdfsehkSJBE", projectId: "zaptishopwhats" }));
    let todos = [];
    window.linkWhatsAppPromo = "";

    const render = (lista) => {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = lista.map(p => `
            <div class="product-card">
                <img class="product-image" src="${p.img || 'https://via.placeholder.com/100'}">
                <div class="product-info">
                    <h3>${p.nome}</h3>
                    <p class="price">R$ ${p.preco}</p>
                    <button class="btn-whatsapp" onclick="window.open('https://wa.me/5534998745318?text=Quero o ${p.nome}')">PEDIR AGORA</button>
                </div>
            </div>`).join('');
    };

    window.filtrar = () => {
        const busca = document.getElementById('campoBusca').value.toLowerCase();
        render(todos.filter(p => p.nome.toLowerCase().includes(busca)));
    };

    onSnapshot(collection(db, "produtos"), (snap) => {
        todos = snap.docs.map(d => d.data());
        render(todos);
    });

    (async () => {
        const snap = await getDoc(doc(db, "config", "promocao_dia"));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('promoBarra').style.display = 'flex';
            document.getElementById('promoTexto').innerText = d.nome;
            document.getElementById('promoValor').innerText = d.preco;
            document.getElementById('promoFoto').src = d.img || '';
            window.linkWhatsAppPromo = `https://wa.me/5534998745318?text=Quero a promoção: ${d.nome}`;
        }
    })();
</script>
</body>
</html>
