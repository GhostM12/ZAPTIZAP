<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevasca Açaí | Uberlândia-MG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Nevasca<span> Açaí</span></h1>
    <p>❄️ O Açaí mais gelado de Uberlândia ❄️</p>
</header>

<div id="promoBarra" onclick="pedirPromo()">
    <img id="promoFoto" src="">
    <div>
        🔥 PROMOÇÃO: <span id="promoTexto"></span> - R$ <span id="promoValor"></span>
        <br><small>TOQUE AQUI PARA PEDIR!</small>
    </div>
</div>

<main class="container" id="vitrine"></main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDdgT50VAOkLWpDrbBJm_dLdfsehkSJBE", projectId: "zaptishopwhats" }));
    let linkWhatsAppPromo = "";

    // Carregar Promoção do Dia
    const carregarPromo = async () => {
        const snap = await getDoc(doc(db, "config", "promocao_dia"));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('promoBarra').style.display = 'flex';
            document.getElementById('promoTexto').innerText = data.nome;
            document.getElementById('promoValor').innerText = data.preco;
            document.getElementById('promoFoto').src = data.img || 'https://via.placeholder.com/55';
            linkWhatsAppPromo = `https://wa.me/5534998745318?text=Olá! Quero a Promoção do Dia: ${data.nome}`;
        }
    };

    window.pedirPromo = () => { if(linkWhatsAppPromo) window.open(linkWhatsAppPromo, '_blank'); };
    carregarPromo();

    // Carregar Lista de Produtos
    onSnapshot(collection(db, "produtos"), (snapshot) => {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = "";
        snapshot.docs.forEach(doc => {
            const p = doc.data();
            vitrine.innerHTML += `
                <div class="product-card">
                    <img class="product-image" src="${p.img || 'https://via.placeholder.com/300'}">
                    <div class="product-info">
                        <h3>${p.nome}</h3>
                        <p class="price">R$ ${p.preco}</p>
                        <button class="btn-whatsapp" onclick="window.open('https://wa.me/5534998745318?text=Quero o ${p.nome}')">PEDIR PELO WHATSAPP</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
